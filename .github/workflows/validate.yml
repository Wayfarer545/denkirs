name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # These checks only gate inclusion in the HACS default store; the
          # integration installs fine as a custom repository without them.
          # - brands: submit the logo to home-assistant/brands (see README)
          # - description/topics: set on the GitHub repository
          ignore: brands description topics
